<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" >
  <meta name="description" content="Job application form for MedizZen" >
  <meta name="keywords" content="HTML, Form, MediZen, employment, application" >
  <meta name="author" content="Jaxon Del Mastro"  >
  <title>MediZen job aplication form</title>
    <link rel="stylesheet" href="styles\images/index.css">
</head>
<body>
    <header>
        <img src="styles/images/MediZenLogo.jpeg" alt="MediZen logo" id="logo">
        <h1>MediZen job application form</h1>
        <h2>Where Health Comes To Rest</h2>
        <nav>
        <a href="#Home Page">Home Page</a> 
         <a href="#Job Application">Job Application</a>
         <a href="#Job Information">Job Information</a> 
         <a href="#Background">Background</a>
        </nav>
    </header>
<!-- Company logo goes here -->

    <h4>Those interested in seeking employment at MediZen are required to fill out the following form in full.</h4>
    <form method="post" action="http://mercury.swin.edu.au/it000000/formtest.php">
        <p>
            <label for="referenceNum">Job Reference Number</label>
            <input type="text" name= "referenceNum" id="referenceNum" pattern="[a-zA-Z0-9]{5}" required="required">
        </p>
        
        <fieldset>
            <legend>Applicant details</legend>
            <p>
                <label for="firstname">First Name</label>
                <input type="text" name= "firstname" id="firstname" pattern="[a-zA-Z]{1-20}" required="required">
            </p>

        </fieldset>




    </form>
</body>
</html>
